services:
    Web_Backend:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
                MYSQL_CLIENT: mariadb-client
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mariadb
            - keycloak

    mariadb:
        image: 'mariadb:11'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        volumes:
            - 'sail-mariadb:/var/lib/mysql'
            - './vendor/laravel/sail/database/mariadb/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
            retries: 3
            timeout: 5s

    # ─── Keycloak DB (Postgres requerido por Keycloak) ────────────────────────
    keycloak-db:
        image: 'postgres:16-alpine'
        environment:
            POSTGRES_DB: keycloak
            POSTGRES_USER: keycloak
            POSTGRES_PASSWORD: '${KC_DB_PASSWORD:-keycloak_pass}'
        volumes:
            - 'sail-keycloak-db:/var/lib/postgresql/data'
        networks:
            - sail
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U keycloak']
            retries: 5
            timeout: 5s

    # ─── Keycloak: Identity Provider ─────────────────────────────────────────
    # Panel admin:  http://localhost:${KC_PORT}/admin
    # Realm:        http://localhost:${KC_PORT}/realms/${KC_REALM}
    # JWKS:         http://keycloak:8080/realms/${KC_REALM}/protocol/openid-connect/certs
    keycloak:
        image: 'quay.io/keycloak/keycloak:24.0'
        command: start-dev --import-realm
        ports:
            - '${KC_PORT:-8080}:8080'
        environment:
            KC_DB: postgres
            KC_DB_URL: 'jdbc:postgresql://keycloak-db/keycloak'
            KC_DB_USERNAME: keycloak
            KC_DB_PASSWORD: '${KC_DB_PASSWORD:-keycloak_pass}'
            KEYCLOAK_ADMIN: '${KC_ADMIN_USER:-admin}'
            KEYCLOAK_ADMIN_PASSWORD: '${KC_ADMIN_PASSWORD:-admin_dev}'
            KC_HOSTNAME_STRICT: 'false'
            KC_HTTP_ENABLED: 'true'
        volumes:
            - './keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json'
        networks:
            - sail
        depends_on:
            keycloak-db:
                condition: service_healthy

networks:
    sail:
        driver: bridge

volumes:
    sail-mariadb:
        driver: local
    sail-keycloak-db:
        driver: local
