name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Tests (corre en cada PR y push a main)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests PHP
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: web_template_test
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo, pdo_mysql, redis, bcmath
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env for testing
        run: |
          cp .env.example .env
          sed -i 's|DB_HOST=mariadb|DB_HOST=127.0.0.1|' .env
          sed -i 's|DB_DATABASE=web_template_db|DB_DATABASE=web_template_test|' .env
          sed -i 's|DB_USERNAME=sail|DB_USERNAME=sail|' .env
          sed -i 's|DB_PASSWORD=123456|DB_PASSWORD=password|' .env
          sed -i 's|SESSION_DRIVER=database|SESSION_DRIVER=array|' .env
          sed -i 's|CACHE_STORE=database|CACHE_STORE=array|' .env
          sed -i 's|QUEUE_CONNECTION=sync|QUEUE_CONNECTION=sync|' .env

      - name: Generate App Key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy (solo en push a main, después de pasar tests)
  # Requiere configurar en Settings > Secrets:
  #   DEPLOY_HOST        → IP o dominio del servidor
  #   DEPLOY_USER        → Usuario SSH del servidor
  #   DEPLOY_SSH_KEY     → Clave privada SSH (contenido completo)
  #   DEPLOY_PATH        → Ruta absoluta del proyecto en el servidor
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy a producción
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Verificar que los secrets están configurados ──────────────────────
      - name: Verificar secrets de deploy
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "⚠️  DEPLOY_HOST no configurado - deploy omitido"
            echo "   Configura los secrets en Settings > Secrets > Actions:"
            echo "   - DEPLOY_HOST: IP o dominio del servidor"
            echo "   - DEPLOY_USER: usuario SSH"
            echo "   - DEPLOY_SSH_KEY: clave privada SSH"
            echo "   - DEPLOY_PATH: ruta del proyecto en el servidor"
            exit 0
          fi

      # ── Deploy por SSH (descomentar cuando el servidor esté configurado) ──
      # - name: Deploy vía SSH
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_SSH_KEY }}
      #     script: |
      #       set -e
      #       cd ${{ secrets.DEPLOY_PATH }}
      #       git pull origin main
      #       composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
      #       php artisan migrate --force
      #       php artisan config:cache
      #       php artisan route:cache
      #       php artisan view:cache
      #       php artisan l5-swagger:generate
      #       php artisan queue:restart
      #       echo "✓ Deploy completado: $(date)"

      - name: Deploy pendiente de configuración
        if: ${{ secrets.DEPLOY_HOST == '' || secrets.DEPLOY_HOST == null }}
        run: |
          echo "✓ Tests pasaron. Deploy omitido - servidor no configurado."
          echo "  Ver comentarios en .github/workflows/deploy.yml para activar."
